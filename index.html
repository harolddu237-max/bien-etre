<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Application Santé Jeunes</title>

    <link rel="stylesheet" href="style.css">

    <!-- Chart.js (graphiques) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <h1>🏥 Suivi Santé des Jeunes</h1>

    <!-- FORMULAIRE -->
    <form id="healthForm">

        <label>Âge</label>
        <input type="number" id="age" required>

        <label>Activité physique (heures/semaine)</label>
        <input type="number" id="sport" required>

        <label>Maladie fréquente</label>
        <input type="text" id="disease" required>

        <label>Visites hôpital / mois</label>
        <input type="number" id="hospital" required>

        <button type="submit">Envoyer</button>

    </form>

    <!-- RESULTAT PERSONNEL -->
    <div id="result"></div>

    <!-- DASHBOARD PERSONNEL -->
    <h2>👤 Dashboard Personnel</h2>
    <canvas id="personalChart"></canvas>

    <!-- DASHBOARD GLOBAL -->
    <h2>🌍 Dashboard Global</h2>

    <p id="userCount">Nombre d’utilisateurs : 0</p>

    <canvas id="globalChart"></canvas>
